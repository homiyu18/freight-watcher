  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --green:   #1D9E75; --green-light: #E1F5EE; --green-dark: #04342C;
      --blue:    #185FA5; --blue-light:  #E6F1FB; --blue-dark:  #042C53;
      --amber:   #BA7517; --amber-light: #FAEEDA; --amber-dark: #633806;
      --gray:    #5F5E5A; --gray-light:  #F1EFE8;
      --red:     #A32D2D;
      --brown:   #854F0B;
      --text:    #1a1a1a; --text2: #666; --border: rgba(0,0,0,0.12);
      --bg:      #fff;    --bg2:   #f5f5f3;
      --radius:  12px;
      --mono: 'Courier New', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f0f0ee; --text2: #aaa; --border: rgba(255,255,255,0.12);
        --bg:   #1a1a18; --bg2:   #252523;
        --green-light: #0a3a28; --blue-light: #0a2040;
        --amber-light: #3a2800; --gray-light:  #2a2a28;
      }
    }
    body { font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── ヘッダー ── */
    #header {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #header-left .title { font-size: 15px; font-weight: 600; line-height: 1.2; }
    #header-left .sub   { font-size: 11px; color: var(--text2); }
    #clock { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; }
    #soon-badge { font-size: 11px; color: var(--amber); font-weight: 600; text-align: right; }

    /* ── メイン ── */
    #main { padding: 12px 16px 100px; max-width: 500px; margin: 0 auto; }

    /* ── 状況バナー ── */
    #status-bar {
      background: var(--green-light); border: 0.5px solid var(--green);
      border-radius: 8px; padding: 8px 12px;
      font-size: 13px; color: var(--green-dark); font-weight: 500;
      margin-bottom: 12px; display: none;
    }

    /* ── 駅選択 ── */
    #locate-btn {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
      background: var(--green); color: #fff; border: none;
      border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 8px;
    }
    #locate-btn:disabled { opacity: 0.6; }
    #loc-err { font-size: 12px; color: #c0392b; text-align: center; margin-bottom: 6px; display: none; }
    #station-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-bottom: 6px; }
    .st-btn {
      padding: 10px 4px; font-size: 13px; border-radius: 8px; cursor: pointer;
      background: var(--bg2); border: 0.5px solid var(--border);
      color: var(--text); line-height: 1.3; text-align: center;
    }
    .st-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
    #area-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 8px; }
    .area-btn {
      padding: 12px 8px; font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer;
      background: var(--bg2); border: 0.5px solid var(--border);
      color: var(--text); text-align: center; line-height: 1.5;
    }
    .area-btn span { font-size: 10px; font-weight: 400; color: var(--text2); display: block; }
    .area-btn.active { border-width: 2px; }
    #station-name { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 12px; }

    /* ── 列車カード ── */
    #train-list { display: flex; flex-direction: column; gap: 8px; }
    .train-card {
      border-radius: var(--radius); padding: 12px 14px;
      border: 1.5px solid;
    }
    .train-card.hot { box-shadow: 0 0 0 3px rgba(186,117,23,0.18); }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-time { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
    .card-no   { font-size: 13px; color: var(--text2); margin-left: 8px; }
    .card-badge { font-size: 12px; padding: 4px 10px; border-radius: 99px; color: #fff; font-weight: 600; white-space: nowrap; }
    .card-route { font-size: 14px; margin-bottom: 6px; }
    .card-route .arrow { color: var(--text2); margin: 0 4px; }
    .card-loco { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
                 padding: 3px 9px; border-radius: 99px; color: #fff; font-weight: 600; }
    .card-desc { font-size: 11px; color: var(--text2); margin-left: 6px; }

    /* ── 空状態 ── */
    #empty { display: none; text-align: center; padding: 3rem 0; color: var(--text2); }
    #empty .emoji { font-size: 40px; margin-bottom: 8px; }
    #prompt { display: none; text-align: center; padding: 3rem 0; color: var(--text2); }

    #more-btn {

      display: flex; align-items: center; gap: 8px; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .link-btn .chevron { margin-left: auto; color: var(--text2); }

    #note { font-size: 11px; color: var(--text2); text-align: center; margin-top: 12px; line-height: 1.7; }
  </style>
</head>

// ── ユーティリティ ──
function timeToMin(t) { const [h,m]=t.split(":").map(Number); return h*60+m; }
function haversine(a,b,c,d){
  const R=6371,r=Math.PI/180,dL=(c-a)*r,dN=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function badge(diff) {

  if(diff<=20) return { label:"🚂もうすぐ",   color:"#185FA5", bg:"var(--blue-light)",  hot:false };
  if(diff<=60) return { label:diff+"分後",    color:"#1D9E75", bg:"var(--green-light)", hot:false };
  return       { label:diff+"分後",           color:"#5F5E5A", bg:"var(--gray-light)",  hot:false };
}

// ── 時計 ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent = h+":"+m;
  if(currentStation) render();
}
setInterval(updateClock, 20000);
updateClock();

// ── JR貨物状況取得 ──
fetch("https://api.anthropic.com/v1/messages",{
  method:"POST", headers:{"Content-Type":"application/json"},
  body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:80,
    messages:[{role:"user",content:"JR貨物の今日の輸送状況を子供向けに一言。絵文字入り「今日は〇〇！」15文字以内。"}]

// 地域→駅マッピング
const AREA_MAP = {
  musashino:   { stations: ['koshigaya','niiza'],  label:'武蔵野線沿線' },
  takasaki:    { stations: ['omiya'],              label:'高崎線沿線' },
  utsunomiya:  { stations: ['omiya'],              label:'宇都宮線沿線' },
  jouban:      { stations: ['koshigaya'],          label:'常磐線沿線' },
};

function selectArea(area) {
  document.querySelectorAll('.area-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const { stations } = AREA_MAP[area];
  // 駅ボタンも表示して選択させる（複数候補の場合）
  document.getElementById('station-detail').style.display = 'block';
  // 候補が1つなら自動選択
  if(stations.length === 1) {
    selectStation(stations[0]);
  } else {
    // 複数の場合は候補だけハイライト
    document.querySelectorAll('.st-btn').forEach(b=>{
      b.style.opacity = stations.includes(b.textContent.trim()) ? '1' : '0.3';
    });
  }
}


function locate() {
  const btn = document.getElementById("locate-btn");
  const err = document.getElementById("loc-err");
  err.style.display = "none";
  if(!navigator.geolocation){ err.style.display="block"; return; }
  btn.disabled = true;
  btn.innerHTML = "<span>⏳</span> 位置情報を取得中…";
  navigator.geolocation.getCurrentPosition(pos=>{
    let best=null, bestD=Infinity;
    for(const [id,s] of Object.entries(STATIONS)){
      const d = haversine(pos.coords.latitude,pos.coords.longitude,s.lat,s.lng);
      if(d<bestD){ bestD=d; best=id; }
    }
    btn.disabled = false;
    btn.innerHTML = "<span>📍</span> 現在地から一番近い駅を選ぶ";
    selectStation(best);
  }, ()=>{
    btn.disabled = false;
    btn.innerHTML = "<span>📍</span> 現在地から一番近い駅を選ぶ";
    err.style.display = "block";
  }, {timeout:8000});
}

// ── 駅選択 ──
function selectStation(id) {
  currentStation = id;
  showAll = false;
  document.querySelectorAll(".st-btn").forEach(b=>b.classList.remove("active"));
  const map = {koshigaya:0, niiza:1, omiya:2, ageo:3};
  document.querySelectorAll(".st-btn")[map[id]].classList.add("active");
  document.getElementById("station-name").textContent = "📍 "+STATIONS[id].name;
  document.getElementById("links").style.display = "flex";
  render();
}

// ── 描画 ──
function render() {
  const now = new Date();
  const nowMin = now.getHours()*60+now.getMinutes();

  allTrains = TRAINS
    .filter(t=>t[currentStation]!=null)
    .map(t=>{ const diff=timeToMin(t[currentStation])-nowMin; const b=badge(diff); return b?{...t,diff,b}:null; })
    .filter(Boolean)
    .sort((a,x)=>a.diff-x.diff);

  const soonCount = allTrains.filter(t=>t.diff>=0&&t.diff<=20).length;
  document.getElementById("soon-badge").textContent = soonCount>0 ? "⚡"+soonCount+"本まもなく" : "";

  const list  = document.getElementById("train-list");
  const empty = document.getElementById("empty");
  const prompt= document.getElementById("prompt");
  const moreBtn = document.getElementById("more-btn");

  prompt.style.display = "none";
  const upcoming = allTrains.filter(t=>t.diff>=0);
  const displayed = showAll ? allTrains : (upcoming.length?upcoming:allTrains).slice(0,8);

  if(displayed.length===0){
    list.innerHTML=""; empty.style.display="block"; moreBtn.style.display="none"; return;
  }
  empty.style.display="none";

  list.innerHTML = displayed.map(t=>{
    const loco = LOCO[t.loco]||LOCO.EF210;
    return `<div class="train-card${t.b.hot?" hot":""}" style="background:${t.b.bg};border-color:${t.b.color}">
      <div class="card-top">
        <div style="display:flex;align-items:baseline">
          <span class="card-time" style="color:${t.b.color}">${t[currentStation]}</span>
          <span class="card-no">${t.no}列車</span>
        </div>
        <span class="card-badge" style="background:${t.b.color}">${t.b.label}</span>
      </div>
      <div class="card-route">
        <strong>${t.from}</strong><span class="arrow">→</span><strong>${t.to}</strong>
      </div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
        <span class="card-loco" style="background:${loco.color}">${loco.emoji} ${loco.name}</span>
        <span class="card-desc">${t.desc}</span>
      </div>
    </div>`;
  }).join("");

  if(allTrains.length>8){
    moreBtn.style.display="block";
    moreBtn.textContent = showAll ? "▲ 少なく表示" : `▼ さらに表示（計${allTrains.length}本）`;
  } else { moreBtn.style.display="none"; }
}

function toggleMore(){ showAll=!showAll; render(); }
</script>
